name: "AWS Deploy"

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Terraform action"
        required: true
        default: "apply"
        type: choice
        options: [plan, apply, destroy]

env:
  TF_VERSION: "1.7.0"

jobs:
  aws-deploy:
    name: "AWS ${{ github.event.inputs.action }}"
    runs-on: ubuntu-latest
    environment: aws

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ap-south-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init -var-file="environments/aws/terraform.tfvars"

      - name: Terraform Plan
        run: |
          terraform plan \
            -var-file="environments/aws/terraform.tfvars" \
            -var="db_password=${{ secrets.DB_PASSWORD }}" \
            -var="ssh_public_key_path=/tmp/id_rsa.pub" \
            -no-color \
            -out=tfplan-aws

      - name: Terraform Apply
        if: github.event.inputs.action == 'apply'
        run: terraform apply -auto-approve tfplan-aws

      - name: Show outputs
        if: github.event.inputs.action == 'apply'
        run: terraform output